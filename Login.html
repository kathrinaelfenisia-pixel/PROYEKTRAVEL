<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PT. Dunia Wisata</title>
    <link rel="stylesheet" href="styletravel.css"> 
</head>
<body class="body-login"> 
    <div class="login-card">
              <h2>Halo, Travelers!</h2>
        <p>Silakan masuk untuk akses penuh di PT. Dunia Wisata</p>
        
      <form action="#">
       <div class="input-group-modern">
            <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            </span>
            <input type="email" placeholder="contoh: kathrina@gmail.com" required>
        </div>

         <div class="input-group-modern">
            <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </span>
            <input type="password" placeholder="Masukkan kata sandi" required>
            <span class="input-icon-eye">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </span>
        </div>
        
            <button type="submit" class="btn-login">MASUK SEKARANG</button>
        </form>

        <div class="login-footer">
            Belum punya akun? <a href="#">Buat Akun Baru</a>
        </div>

        <a href="index.html" class="back-home">← Kembali ke Beranda</a>
    </div>

</body>
        </div>
        
</html>
